name: nearby_service_app
description: A new Flutter project for Nearby Service Contacts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  geolocator: ^10.0.0
  flutter_riverpod: ^2.4.0
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.0
  intl: ^0.18.0
  crypto: ^3.0.3
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - Icons and assets/

