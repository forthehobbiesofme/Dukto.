<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

  <title>AutoConnect</title>
  <meta name="description" content="Find nearby service autos instantly.">
  <meta name="theme-color" content="#FF9F45">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #FFFFFF;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }
    #skeleton-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      height: 100vh;
      box-sizing: border-box;
    }
    .profile-circle {
      width: 150px;
      height: 150px;
      background-color: #BDBDBD;
      border-radius: 50%;
      margin-top: 50px;
    }
    .text-placeholder {
      width: 200px;
      height: 20px;
      background-color: #f0f0f0;
      margin-top: 40px;
      border-radius: 4px;
    }
    .toggle-container {
      width: 100%;
      max-width: 300px;
      height: 65px;
      background-color: #FFD1B2;
      border: 1px solid #E89E5B;
      border-radius: 20px;
      margin-top: 30px;
      display: flex;
      padding: 6px;
      box-sizing: border-box;
    }
    .toggle-left {
      flex: 1;
      background-color: #F58E3C;
      border-radius: 15px;
    }
    .toggle-right {
      flex: 1;
    }
    .input-line {
      width: 100%;
      max-width: 300px;
      height: 2px;
      background-color: #E89E5B;
      margin-top: 50px;
    }
    .next-button {
      align-self: flex-end;
      width: 120px;
      height: 50px;
      background-color: #FFD1B2;
      border: 1.5px solid #EAA297;
      border-radius: 12px;
      margin-top: 50px;
      margin-right: 10%;
    }
    /* Simple shimmer effect */
    .shimmer {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <!-- This UI appears in ~5 milliseconds -->
  <div id="skeleton-ui">
    <div class="profile-circle shimmer"></div>
    <div class="text-placeholder shimmer"></div>
    <div class="toggle-container">
      <div class="toggle-left"></div>
      <div class="toggle-right"></div>
    </div>
    <div class="input-line"></div>
    <div class="input-line"></div>
    <div class="next-button"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // The skeleton is removed automatically when Flutter renders its first frame
    // because Flutter attaches its canvas to the body.
  </script>
</body>
</html>
